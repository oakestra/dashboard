<nb-card>
    <nb-card-header>
        <h1>Instance Details</h1>
    </nb-card-header>
</nb-card>

<div class="row">
    <div class="col-lg-4">
        <nb-card>
            <nb-card-header>
                <h2>Details</h2>
            </nb-card-header>
            <nb-card-body class="map">
                <div class="information">
                    <ng-container *ngIf="instance | async as currentInstance">
                        <p><b>Status:</b> {{ currentInstance?.status }}</p>
                        <p><b>Disk:</b> {{ currentInstance?.disk }}</p>
                        <p><b>Cluster:</b> {{ currentInstance?.cluster_id }}</p>
                        <p><b>Node IP:</b> {{ currentInstance?.publicip }}</p>
                    </ng-container>
                </div>
            </nb-card-body>
        </nb-card>
    </div>

    <div class="col-lg-8">
        <nb-card>
            <nb-card-header>
                <h2>Location</h2>
            </nb-card-header>
            <nb-card-body class="map-card">
                <div *ngIf="textLocation; else mapView">{{ textLocation }}</div>
                <ng-template #mapView>
                    <div class="map" #mapContainer></div>
                </ng-template>
            </nb-card-body>
        </nb-card>
    </div>
</div>

<div class="row">
    <div class="col-lg-6">
        <nb-card>
            <nb-card-header><h2>CPU</h2></nb-card-header>
            <nb-card-body>
                <chart-cpu-line [instance$]="instance"></chart-cpu-line>
            </nb-card-body>
        </nb-card>
    </div>
    <div class="col-lg-6">
        <nb-card>
            <nb-card-header><h2>Memory</h2></nb-card-header>
            <nb-card-body>
                <chart-memory-line [instance$]="instance"></chart-memory-line>
            </nb-card-body>
        </nb-card>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <nb-card>
            <nb-card-header><h2>Logs</h2></nb-card-header>
            <nb-card-body>
                <textarea type="text" class="code-logs" rows="10" cols="100" disabled> {{ (instance | async)?.logs }} </textarea>
            </nb-card-body>
        </nb-card>
    </div>
</div>
